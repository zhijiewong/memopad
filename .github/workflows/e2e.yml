name: E2E

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install npm dependencies
        run: npm ci

      - name: Install tauri-driver
        run: cargo install tauri-driver --locked

      - name: Run e2e suite
        shell: bash
        run: |
          # `tauri build` exits non-zero in CI because the updater public key is
          # configured but TAURI_SIGNING_PRIVATE_KEY is unset. app.exe is still
          # produced, so tolerate that specific exit and gate the tests on the
          # binary existing — a genuine build failure leaves no app.exe and fails
          # here, before mocha runs. (Splitting build from `&& mocha` is why the
          # signing error previously skipped the whole suite.)
          rm -f src-tauri/target/release/app.exe
          npm run tauri build || echo "tauri build exited non-zero (unsigned CI build); verifying binary"
          test -f src-tauri/target/release/app.exe
          npx mocha
        env:
          WEBKIT_DISABLE_COMPOSITING_MODE: 1

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots
          path: tests/e2e/*.png
          if-no-files-found: ignore
